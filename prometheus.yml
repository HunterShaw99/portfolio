# Global configuration
global:
  scrape_interval: 5s # How frequently to scrape targets
  evaluation_interval: 5s # How frequently to evaluate rules
  scrape_timeout: 4s # Timeout for scrape requests

# Rule files specifies additional alerting and recording rules
rule_files:
  # - "alert.rules"
  # - "recording.rules"

# Alerting configuration
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: []

# Scrape configuration - defines what to monitor
scrape_configs:
  # Monitor Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Monitor Next.js application
  - job_name: "nextjs-app"
    metrics_path: "/api/metrics"
    static_configs:
      - targets: ["app:3000"] # 'app' is the service name in docker-compose
    scrape_interval: 5s # More frequent scraping for main app
